<!-- our-customers.html component -->
<section id="our_customers" class="py-5">
  <div class="container-xl">
    <div class="text-center mb-5">
      <h1 class="display-5 text-uppercase">Our <span class="text-primary">Clients</span></h1>
      <p class="text-muted">Institutions and organizations across Greater Boston.</p>
    </div>
    <div class="row g-4 justify-content-center align-items-center" id="our-customers-grid"></div>
  </div>
</section>

<style>
.ourcust-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  border: 1px solid #e5e5e5;
  border-radius: 8px;
  background: #fff;
  height: 140px;
  transition: box-shadow .2s;
}
.ourcust-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.1); }
.ourcust-card img {
  max-height: 56px;
  max-width: 180px;
  object-fit: contain;
  filter: grayscale(100%);
  opacity: .65;
  transition: filter .2s, opacity .2s;
}
.ourcust-card:hover img { filter: grayscale(0%); opacity: 1; }
.ourcust-name {
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: #999;
  margin-top: .75rem;
  text-align: center;
}
</style>

<script>
(function () {
  fetch('/assets/db.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json() })
    .then(data => {
      const html = data.our_customers.map(c => `
        <div class="col-6 col-md-3">
          <div class="ourcust-card">
            <img src="${c.logo}" alt="${c.name}">
            <div class="ourcust-name">${c.short}</div>
          </div>
        </div>`).join('')
      document.getElementById('our-customers-grid').innerHTML = html
    })
    .catch(() => {})
})()
</script>
