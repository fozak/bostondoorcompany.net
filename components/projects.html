<!-- projects.html component — loaded by your loader -->
<section id="projects" class="section-bg">
  <div class="container-xl">
    <div class="text-center mb-5">
      <h1 class="display-5 text-uppercase">Our <span class="text-primary">Projects</span></h1>
      <p class="text-muted">Expert door restoration, repair, and installation across Greater Boston.</p>
    </div>
    <div class="row g-4" id="projects-grid"></div>
  </div>
</section>

<div id="projects-modals"></div>

<style>
.proj-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;overflow-y:auto;padding:2rem 1rem;}
.proj-modal:target{display:block;}
.modal-box{background:#fff;border-radius:12px;width:100%;max-width:1100px;margin:0 auto;overflow:hidden;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid #e5e5e5;}
.modal-close{display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;background:#f4f4f4;border-radius:50%;text-decoration:none;color:#333;font-size:1.25rem;line-height:1;}
.pair-grid{display:grid;grid-template-columns:1fr 1px 1fr;}
.pair-img{width:100%;height:460px;object-fit:cover;display:block;}
.pair-label{padding:.4rem 1rem;font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;background:#f4f4f4;color:#666;}
.pair-divider{background:#ddd;}
.pair-wrap{border-bottom:1px solid #e5e5e5;}
.after-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px;padding:1rem;}
.after-gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:4px;cursor:pointer;}
.scope-badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-bottom:.5rem;}
.scope-badge.exterior{background:#e8f4fd;color:#185FA5;}
.scope-badge.interior{background:#faeeda;color:#854F0B;}
</style>

<script>
(function () {

  const SERVICES = {
    'door-restoration':     { label: 'Door Restoration & Refinishing', icon: 'fa-paint-brush' },
    'door-repair':          { label: 'Door Repair',                    icon: 'fa-tools' },
    'door-installation':    { label: 'Door Installation',              icon: 'fa-door-open' },
    'door-hardware':        { label: 'Hardware & Locks',               icon: 'fa-key' },
    'door-weatherproofing': { label: 'Weatherproofing',               icon: 'fa-wind' },
    'finish-carpentry':     { label: 'Finish Carpentry',               icon: 'fa-ruler-combined' },
    'custom-doors':         { label: 'Custom Doors',                   icon: 'fa-star' }
  }

  const img     = (projectId, stem) => `/assets/${projectId}.${stem}.jpg`
  const modalId = (projectId, doorId) => `modal-${projectId}--${doorId}`

  function renderCard(project, door) {
    const svc = SERVICES[project.service] || { label: project.service, icon: 'fa-door-open' }
    const mid = modalId(project.id, door.id)
    const snippet = door.description.split('.')[0] + '.'
    return `
      <div class="col-lg-4 col-md-6">
        <div class="card h-100 overflow-hidden">
          <a href="#${mid}">
            <div style="height:340px;overflow:hidden;">
              <img class="w-100 h-100" style="object-fit:cover;object-position:center;"
                src="${img(project.id, door.card_image)}"
                alt="${door.label}"
                loading="lazy">
            </div>
          </a>
          <div class="card-body text-center">
            <div class="svc-icon mb-2"><i class="fa ${svc.icon} fa-lg"></i></div>
            <span class="scope-badge ${door.scope}">${door.scope}</span>
            <h5 class="text-uppercase">${door.label}</h5>
            <p class="text-muted small text-start">${snippet}</p>
            <p class="text-muted small text-start mb-0">
              <i class="fa fa-map-marker-alt me-1 text-primary"></i>${project.location}
            </p>
            <a href="#${mid}" class="btn btn-sm btn-outline-primary mt-3">View Project</a>
          </div>
        </div>
      </div>`
  }

  function renderPairs(project, door) {
    return door.pairs.map(pair => `
      <div class="pair-wrap">
        <div class="pair-grid">
          <div>
            <div class="pair-label">${pair.label} &mdash; Before</div>
            <img class="pair-img" src="${img(project.id, pair.before)}" alt="${pair.label} before" loading="lazy">
          </div>
          <div class="pair-divider"></div>
          <div>
            <div class="pair-label">${pair.label} &mdash; After</div>
            <img class="pair-img" src="${img(project.id, pair.after)}" alt="${pair.label} after" loading="lazy">
          </div>
        </div>
      </div>`).join('')
  }

  function renderAfterGallery(project, door) {
    if (!door.after || !door.after.length) return ''
    const pairAfters = new Set(door.pairs.map(p => p.after))
    const extra = door.after.filter(s => !pairAfters.has(s))
    if (!extra.length) return ''
    return `
      <div style="border-top:1px solid #e5e5e5;padding:1rem 1.5rem .5rem;">
        <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:#666;margin-bottom:.75rem;">
          More After Photos
        </p>
      </div>
      <div class="after-gallery">
        ${extra.map(s => `
          <img src="${img(project.id, s)}" alt="After" loading="lazy">`).join('')}
      </div>`
  }

  function renderWorkList(door) {
    return door.work.map(w =>
      `<li class="mb-2"><i class="fa fa-check text-primary me-2"></i>${w}</li>`
    ).join('')
  }

  function renderMeta(project) {
    return project.meta.map(m => `
      <tr>
        <td class="text-muted ps-0" style="width:40%">${m.label}</td>
        <td class="fw-semibold">${
          m.label === 'Status'
            ? `<span class="badge bg-success">${m.value}</span>`
            : m.value
        }</td>
      </tr>`).join('')
  }

  function renderModal(project, door) {
    const mid = modalId(project.id, door.id)
    return `
      <div id="${mid}" class="proj-modal">
        <div class="modal-box">

          <div class="modal-header">
            <div>
              <div style="font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:#999;">
                ${project.subtitle || project.title}
              </div>
              <strong style="text-transform:uppercase;letter-spacing:.05em;font-size:.95rem;">
                ${door.label}
              </strong>
            </div>
            <a href="#" class="modal-close" aria-label="Close">&times;</a>
          </div>

          ${renderPairs(project, door)}
          ${renderAfterGallery(project, door)}

          <div class="p-4" style="border-top:1px solid #e5e5e5;">
            <div class="row g-5 align-items-start">

              <div class="col-lg-7">
                <h2 class="display-6 text-uppercase mb-3">
                  About This <span class="text-primary">Project</span>
                </h2>
                ${project.description.map(p =>
                  `<p class="text-muted" style="font-size:1.05rem;">${p}</p>`
                ).join('')}
                <h6 class="text-uppercase text-muted mb-3 mt-4">Work Completed</h6>
                <ul class="list-unstyled mb-0">${renderWorkList(door)}</ul>
              </div>

              <div class="col-lg-5">
                <div class="card">
                  <div class="card-body p-4">
                    <h5 class="text-uppercase mb-4">Project Details</h5>
                    <table class="table table-borderless mb-0">
                      <tbody>${renderMeta(project)}</tbody>
                    </table>
                    <hr>
                    <p class="text-muted small mb-3">
                      Have historic doors worth saving? Free on-site assessment, no obligation.
                    </p>
                    <a href="tel:6175396365" class="btn btn-primary w-100 mb-2"
                      onclick="gtag('event','phone_click',{location:'project_modal'})">
                      <i class="fa fa-phone me-2"></i>(617) 539-6365
                    </a>
                    <a href="#contact" class="btn btn-outline-primary w-100"
                      onclick="document.getElementById('${mid}').style.display='none'">
                      Get A Free Estimate
                    </a>
                  </div>
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>`
  }

  // boot
  fetch('/assets/db.json')
    .then(r => {
      if (!r.ok) throw new Error(`db.json ${r.status}`)
      return r.json()
    })
    .then(projects => {
      const cards  = []
      const modals = []

      projects.forEach(project => {
        project.doors.forEach(door => {
          cards.push(renderCard(project, door))
          modals.push(renderModal(project, door))
        })
      })

      document.getElementById('projects-grid').innerHTML   = cards.join('')
      document.getElementById('projects-modals').innerHTML = modals.join('')
    })
    .catch(err => {
      console.error('[projects]', err.message)
      document.getElementById('projects-grid').innerHTML =
        '<p class="text-muted text-center col-12">Projects unavailable — please try again later.</p>'
    })

})()
</script>
