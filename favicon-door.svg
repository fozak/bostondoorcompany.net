<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Door body -->
  <rect x="4" y="1" width="24" height="30" rx="1" fill="#7B4A1E" stroke="#4a2e0e" stroke-width="1"/>
  <!-- Door inset frame -->
  <rect x="5.5" y="2.5" width="21" height="27" rx="1" fill="#8B5523" stroke="#5c3510" stroke-width="0.5"/>
  <!-- Top panel -->
  <rect x="7" y="4" width="18" height="10" rx="1" fill="#9C6535" stroke="#5c3510" stroke-width="0.5"/>
  <rect x="8" y="5" width="16" height="8" rx="0.5" fill="none" stroke="#7B4A1E" stroke-width="0.5" opacity="0.6"/>
  <!-- Bottom panel -->
  <rect x="7" y="16" width="18" height="11" rx="1" fill="#9C6535" stroke="#5c3510" stroke-width="0.5"/>
  <rect x="8" y="17" width="16" height="9" rx="0.5" fill="none" stroke="#7B4A1E" stroke-width="0.5" opacity="0.6"/>
  <!-- Knob -->
  <circle cx="23" cy="18" r="1.8" fill="#C8A060" stroke="#8a6830" stroke-width="0.5"/>
  <!-- Keyhole -->
  <circle cx="23" cy="21" r="0.8" fill="#4a2e0e"/>
  <rect x="22.6" y="21.5" width="0.8" height="1.5" rx="0.3" fill="#4a2e0e"/>
</svg>
